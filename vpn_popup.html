<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            background: rgba(22, 22, 30, 0.95) !important; 
            margin: 0; 
            padding: 0;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            overflow: hidden;
            backdrop-filter: blur(25px);
        }
        .vpn-popup-header {
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .vpn-popup-header span {
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--primary);
        }
        .close-popup {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
        }
        .vpn-popup-body {
            padding: 20px;
        }
        .vpn-status-container {
            text-align: center;
            margin-bottom: 20px;
        }
        .vpn-status-label { font-size: 10px; color: var(--text-secondary); letter-spacing: 1px; margin-bottom: 5px; }
        .vpn-status-value { font-size: 20px; font-weight: 800; color: #ff4444; }
        .vpn-ip-box {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            border: 1px dashed var(--border-color);
        }
        .info-footer { font-size: 9px; color: var(--text-secondary); text-align: center; margin-top: 20px; line-height: 1.4; }
    </style>
</head>
<body>
    <div class="vpn-popup-header">
        <span><i class="fas fa-shield-alt"></i> PROTON VPN PRO</span>
        <button class="close-popup" onclick="closeMe()"><i class="fas fa-times"></i></button>
    </div>
    <div class="vpn-popup-body">
        <div class="vpn-status-container">
            <div class="vpn-status-label">BAĞLANTI DURUMU</div>
            <div class="vpn-status-value" id="vpnStatusText">BAĞLI DEĞİL</div>
        </div>
        
        <div class="vpn-ip-box">
            <div style="font-size: 10px; color: var(--text-secondary);">GÜNCEL IP ADRESİNİZ</div>
            <div id="vpnIpValue" style="font-family: monospace; font-size: 14px; margin-top: 5px;">---.---.---.---</div>
        </div>

        <button class="intel-btn primary" id="vpnConnectBtn" style="width: 100%; height: 45px; margin-top: 20px;">
            VPN BAĞLANTISINI BAŞLAT
        </button>
        
        <div class="info-footer">
            Proton VPN koruması şifreli tünel üzerinden sağlanır.
        </div>
    </div>

    <script>
        const { ipcRenderer } = require('electron');
        
        function closeMe() {
            ipcRenderer.invoke('toggle-vpn-ui', false);
        }

        async function updateVpnInfo() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                document.getElementById('vpnIpValue').innerText = data.ip;
            } catch (e) {
                document.getElementById('vpnIpValue').innerText = "IP ALINAMADI";
            }
        }

        document.getElementById('vpnConnectBtn').addEventListener('click', () => {
            ipcRenderer.invoke('navigate-to', 'https://account.protonvpn.com/login');
            // Inform main window to update icon state if needed
            ipcRenderer.send('vpn-internal-activate');
            closeMe();
        });

        updateVpnInfo();
    </script>
</body>
</html>
